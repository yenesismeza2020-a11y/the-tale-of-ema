<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Archive</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:#05060d;
color:white;
font-family:Consolas, monospace;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
z-index:2;
position:relative;
width:700px;
max-width:90%;
}

h1{
font-size:55px;
letter-spacing:8px;
margin-bottom:30px;
}

.line{
font-size:20px;
margin:12px 0;
opacity:0;
animation:fade 1s forwards;
}

.line:nth-child(2){animation-delay:1s;}
.line:nth-child(3){animation-delay:2.5s;}
.line:nth-child(4){animation-delay:4s;}
.line:nth-child(5){animation-delay:5.5s;}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* 🌙 partículas */
.stars{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
background:transparent;
overflow:hidden;
z-index:1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.6;
animation:float 6s infinite linear;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<h1>DREAM ARCHIVE</h1>

<div class="line">Initializing...</div>
<div class="line">Searching for Traveler...</div>
<div class="line">Traveler Found: EMA</div>
<div class="line">Loading Memories...</div>

</div>

<!-- 🎵 música -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b6b6d2c7.mp3" type="audio/mp3">
</audio>

<script>

// 🌟 crear estrellas
const starsContainer = document.getElementById("stars");

for(let i=0;i<60;i++){
let star = document.createElement("div");
star.classList.add("star");
star.style.left = Math.random()*100 + "vw";
star.style.animationDuration = (3 + Math.random()*5) + "s";
star.style.opacity = Math.random();
starsContainer.appendChild(star);
}

</script>

</body>
</html>
