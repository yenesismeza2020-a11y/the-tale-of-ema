<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tale of Ema - Hollow Knight Vibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Bloqueo para Celulares -->
    <div id="mobile-blocker">
        <div class="blocker-content">
            <div class="dream-key-icon">✧</div>
            <p>"Este sueño es demasiado vasto para un contenedor tan pequeño... Regresa desde una computadora para despertar la esencia."</p>
        </div>
    </div>

    <!-- Fondo de Niebla Animada -->
    <div class="fog-container">
        <div class="fog-layer fog-1"></div>
        <div class="fog-layer fog-2"></div>
    </div>

    <!-- Canvas para Partículas de Esencia -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Contenedor Principal -->
    <div class="main-container">
        
        <!-- Elemento Místico: Sello de Sueño -->
        <div class="dream-key-container">
            <div class="dream-key-icon" id="seal-icon">🔒</div>
            <div class="dream-key-glow"></div>
        </div>

        <!-- Efecto Máquina de Escribir -->
        <div class="typewriter-box">
            <h1 id="typewriter-text"></h1>
        </div>

        <!-- Barra de Carga -->
        <div class="loading-wrapper" id="loadingWrapper">
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <span class="loading-status" id="loadingStatus">Buscando esencia...</span>
        </div>

        <!-- SECCIÓN DEL PUZZLE (Aparece tras la carga) -->
        <div id="puzzle-section" class="hidden">
            <p class="puzzle-hint">Golpea los orbes de sueño en el orden correcto para romper el sello...</p>
            <div class="orbs-container">
                <div class="dream-orb" data-id="1">✧</div>
                <div class="dream-orb" data-id="2">✧</div>
                <div class="dream-orb" data-id="3">✧</div>
            </div>
        </div>

        <!-- Botón de Destino (Oculto hasta resolver el puzzle) -->
        <a href="https://presentacionfinal12.my.canva.site/the-tale-of-ema" target="_blank" class="hk-button" id="enterButton">
            <span class="btn-glow"></span>
            Ingresar al Sueño
        </a>

    </div>

    <div class="audio-player">
        <iframe width="0" height="0" src="https://www.youtube.com/embed/0HbnqXnKnuE?autoplay=1&loop=1&playlist=0HbnqXnKnuE" frameborder="0" allow="autoplay"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
