<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dream Archive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#05060d;
color:white;
font-family:Consolas, monospace;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

.container{

width:700px;

max-width:90%;

}

h1{

font-size:55px;

letter-spacing:8px;

margin-bottom:40px;

text-align:center;

}

.line{

font-size:22px;

margin:18px 0;

opacity:0;

animation:fade .8s forwards;

}

.line:nth-child(2){animation-delay:1s;}
.line:nth-child(3){animation-delay:2.5s;}
.line:nth-child(4){animation-delay:4s;}
.line:nth-child(5){animation-delay:5.5s;}

@keyframes fade{

from{

opacity:0;
transform:translateY(15px);

}

to{

opacity:1;
transform:translateY(0px);

}

}

</style>

</head>

<body>

<div class="container">

<h1>DREAM ARCHIVE</h1>

<div class="line">
Initializing...
</div>

<div class="line">
Searching for Traveler...
</div>

<div class="line">
Traveler Found: EMA
</div>

<div class="line">
Loading Memories...
</div>

</div>

</body>

</html>
